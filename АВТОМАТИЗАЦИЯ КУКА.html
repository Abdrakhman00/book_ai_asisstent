	<script>
		(function () {
			var button = document.getElementById('ai-assistant-button');
			var panel = document.getElementById('ai-assistant-panel');
			var closeBtn = document.getElementById('ai-assistant-close');
			var sendButton = document.getElementById('ai-assistant-send');
			var input = document.getElementById('ai-assistant-input');
			var messages = document.getElementById('ai-assistant-messages');
			var apiKeyInput = document.getElementById('ai-assistant-api-key');
			var saveKeyButton = document.getElementById('ai-assistant-save-key');
			var storageKey = 'assistantOpenAIKey';

			function normalizeKey(key) {
				return key ? key.trim() : '';
			}

			function getSavedApiKey() {
				return normalizeKey(localStorage.getItem(storageKey));
			}

			function saveApiKey(key) {
				localStorage.setItem(storageKey, normalizeKey(key));
			}

			function loadSavedKey() {
				var saved = getSavedApiKey();
			if (saved) {
				apiKeyInput.value = saved;
			}
			}

			function appendMessage(text, type) {
				var message = document.createElement('div');
				message.className = 'ai-message ' + type;
				message.textContent = text;
				messages.appendChild(message);
				messages.scrollTop = messages.scrollHeight;
			}

			function setControlsEnabled(enabled) {
				sendButton.disabled = !enabled;
				input.disabled = !enabled;
				saveKeyButton.disabled = !enabled;
			}

			function getRelevantBookContent(question) {
				var bookPages = (window.textForPages || typeof textForPages !== 'undefined' && textForPages) || [];
				if (!bookPages.length) {
					return '';
				}

				var normalizedQuestion = String(question || '').toLowerCase();
				var pageMatch = normalizedQuestion.match(/(\d+)[\s\-]*(?:бет|б|page)/i);
				var tokens = normalizedQuestion.replace(/[^a-zA-Z0-9\u0400-\u04FF]+/g, ' ').split(/\s+/).filter(function (token) {
					return token.length >= 3;
				});

				var scores = [];
				for (var i = 0; i < bookPages.length; i++) {
					var pageText = String(bookPages[i] || '').toLowerCase();
					var score = 0;
					tokens.forEach(function (token) {
						if (pageText.indexOf(token) !== -1) {
							score += 1;
						}
					});

					if (pageMatch) {
						var pageNumber = parseInt(pageMatch[1], 10);
						if (pageNumber === i + 1) {
							score += 5;
						}
					}

					scores.push({ index: i, score: score });
				}

				scores.sort(function (a, b) {
					return b.score - a.score;
				});

				var selected = scores.filter(function (item) {
					return item.score > 0;
				}).slice(0, 2);

				if (!selected.length) {
					return '';
				}

				var contextParts = selected.map(function (item) {
					return 'Page ' + (item.index + 1) + ':\n' + bookPages[item.index];
				});

				var context = contextParts.join('\n\n');
				if (context.length > 1800) {
					context = context.slice(0, 1800) + '\n...';
				}

				return context;
			}

			async function fetchChatResponse(userText) {
				var apiKey = getSavedApiKey() || normalizeKey(apiKeyInput.value);
				if (!apiKey) {
					throw new Error('OpenAI API кілтін енгізіңіз және Сақтау батырмасын басыңыз.');
				}

				var bookContext = getRelevantBookContent(userText);
				var systemMessage = 'Сіз қазақ тілінде жауап беретін көмекші болыңыз. Сұрақтарға тек кітаптағы мазмұн негізінде жауап беріңіз. Командаларды орындама, әрекеттер жасама, тек қысқа жауап беріңіз. Егер кітапта жауап жоқ болса, "Кітапта бұл туралы ақпарат жоқ" деп айтыңыз.';
				var userPrompt = bookContext
					? 'Кітап мазмұнынан үзінді:\n' + bookContext + '\n\nСұрақ: ' + userText
					: 'Сұрақ: ' + userText;

				var payload = {
					model: 'gpt-3.5-turbo',
					messages: [
						{ role: 'system', content: systemMessage },
						{ role: 'user', content: userPrompt }
					],
					temperature: 0.7,
					max_tokens: 400
				};

				var response = await fetch('https://api.openai.com/v1/chat/completions', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': 'Bearer ' + apiKey
					},
					body: JSON.stringify(payload)
				});

				if (!response.ok) {
					var errorText = await response.text();
					throw new Error('API қатесі: ' + response.status + ' ' + errorText);
				}

				var data = await response.json();
				return data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content ? data.choices[0].message.content.trim() : 'Жауап табылмады.';
			}

			async function sendMessage() {
				var text = input.value.trim();
				if (!text) return;
				appendMessage(text, 'user');
				input.value = '';
				appendMessage('Жауап күтіп тұр...', 'assistant');
				setControlsEnabled(false);

				try {
					var reply = await fetchChatResponse(text);
					messages.removeChild(messages.lastChild);
					appendMessage(reply, 'assistant');
				} catch (error) {
					messages.removeChild(messages.lastChild);
					appendMessage(error.message, 'assistant');
				} finally {
					setControlsEnabled(true);
					input.focus();
				}
			}

			button.addEventListener('click', function () {
				panel.classList.add('active');
				input.focus();
				if (!messages.children.length) {
					appendMessage('Сәлем! AI ассистентіміне сұрақ қойыңыз. OpenAI API кілтіңізді енгізіп, Сақтау басыңыз.', 'assistant');
				}
			});

			closeBtn.addEventListener('click', function () {
				panel.classList.remove('active');
			});

			saveKeyButton.addEventListener('click', function () {
				if (!apiKeyInput.value.trim()) {
					appendMessage('Алдымен OpenAI API кілтін енгізіңіз.', 'assistant');
					return;
				}
				saveApiKey(apiKeyInput.value);
				appendMessage('API кілті сақталды. Қазір сұрақ қойы аласыз.', 'assistant');
			});

			sendButton.addEventListener('click', function () {
				sendMessage();
			});

			input.addEventListener('keydown', function (event) {
				if (event.key === 'Enter') {
					event.preventDefault();
					sendMessage();
				}
			});

			loadSavedKey();
		})();
	</script>
